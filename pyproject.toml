[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    "venv",
    ".venv",
    "__pycache__",
]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "N",
    "UP",
    "B",
    "C4",
    "SIM",
    "PTH",
    "RUF",
]
ignore = [
    "E501",
    "RUF001",
    "RUF002",
    "RUF003",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --tb=short --strict-markers"
asyncio_mode = "auto"
markers = [
    "unit: backend unit tests, including repository/service seams against compose MongoDB",
    "integration: backend integration tests using isolated test databases",
    "smoke: explicit smoke checks that are not part of default pytest discovery",
    "real_ai: opt-in smoke that may call a configured real AI provider",
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = [
    "venv",
    ".venv",
    "__pycache__",
]

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv", "__pycache__"]
