<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>强国有我大思政课案例库 - 上海大学</title>

    <!-- 图标 -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>"
    />

    <!-- 样式 -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- 字体 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- 顶部导航 -->
    <header class="header">
      <div class="container">
        <div class="header-content">
          <div class="logo">
            <div class="logo-icon">🏛️</div>
            <div class="logo-text">
              <h1>强国有我</h1>
              <p>大思政课案例库</p>
            </div>
          </div>
          <nav class="nav" id="main-nav">
            <a
              href="#"
              class="nav-link active"
              data-page="home"
              onclick="navigateTo('home')"
              >首页</a
            >
            <a
              href="#"
              class="nav-link"
              data-page="cases"
              onclick="navigateTo('cases')"
              >案例库</a
            >
            <a
              href="#"
              class="nav-link"
              id="nav-create"
              data-page="create"
              onclick="navigateTo('create')"
              >创建案例</a
            >
            <a
              href="#"
              class="nav-link"
              data-page="stats"
              onclick="navigateTo('stats')"
              >数据统计</a
            >
            <a
              href="#"
              class="nav-link"
              id="nav-my-cases"
              style="display: none"
              data-page="my-cases"
              onclick="navigateTo('my-cases')"
              >我的提交</a
            >
            <a
              href="#"
              class="nav-link"
              id="nav-review"
              style="display: none"
              data-page="review"
              onclick="navigateTo('review')"
              >审核管理</a
            >
            <a
              href="#"
              class="nav-link"
              id="nav-login"
              onclick="openLoginModal()"
              >登录/注册</a
            >
            <a
              href="#"
              class="nav-link"
              id="nav-logout"
              style="display: none"
              onclick="logout()"
              >登出</a
            >
            <div id="nav-user-menu" class="user-menu" style="display: none">
              <button
                type="button"
                id="nav-user-avatar"
                class="user-avatar"
                onclick="toggleUserMenu(event)"
              ></button>
              <div id="user-dropdown" class="user-dropdown">
                <div class="user-dropdown-name" id="user-dropdown-name"></div>
                <div class="user-dropdown-role" id="user-dropdown-role"></div>
                <button type="button" class="user-dropdown-action" onclick="openChangePasswordModal(false)">
                  &#20462;&#25913;&#23494;&#30721;
                </button>
                <button type="button" class="user-dropdown-action" onclick="logout()">
                  &#36864;&#20986;&#30331;&#24405;
                </button>
              </div>
            </div>
          </nav>
        </div>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main">
      <!-- 首页 -->
      <div id="page-home" class="page active">
        <section class="hero">
          <div class="container">
            <div class="hero-content">
              <h2 class="hero-title">落实立德树人根本任务</h2>
              <p class="hero-subtitle">
                汇聚上海大学思政教育优秀案例，打造大思政课育人高地
              </p>
              <div class="hero-actions">
                <button class="btn btn-primary" onclick="navigateTo('cases')">
                  浏览案例库
                </button>
                <button
                  class="btn btn-secondary"
                  onclick="navigateTo('create')"
                >
                  提交新案例
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- 统计卡片 -->
        <section class="stats-section">
          <div class="container">
            <h3 class="section-title">数据概览</h3>
            <div class="stats-grid" id="stats-grid">
              <!-- 动态加载 -->
            </div>
          </div>
        </section>

        <!-- 热门案例 -->
        <section class="featured-section">
          <div class="container">
            <h3 class="section-title">🔥 热门案例</h3>
            <div class="cases-grid" id="trending-cases">
              <!-- 动态加载 -->
            </div>
          </div>
        </section>

        <!-- 最新案例 -->
        <section class="featured-section">
          <div class="container">
            <h3 class="section-title">✨ 最新案例</h3>
            <div class="cases-grid" id="latest-cases">
              <!-- 动态加载 -->
            </div>
          </div>
        </section>
      </div>

      <!-- 案例库 -->
      <div id="page-cases" class="page">
        <div class="container">
          <div class="page-header">
            <h2 class="page-title">案例库</h2>
            <div class="filter-section">
              <div class="search-box">
                <input
                  type="text"
                  id="search-input"
                  placeholder="搜索案例..."
                  onkeypress="if (event.key === 'Enter') searchCases();"
                />
                <button class="search-btn" onclick="searchCases()">🔍</button>
              </div>
              <div class="filters">
                <select
                  id="filter-type"
                  class="filter-select"
                  onchange="applyFilters()"
                >
                  <option value="">全部类型</option>
                  <option value="TYPE_A">思政课教学案例</option>
                  <option value="TYPE_B">课程思政案例</option>
                  <option value="TYPE_C">实践育人案例</option>
                </select>
                <select
                  id="filter-theme"
                  class="filter-select"
                  onchange="applyFilters()"
                >
                  <option value="">全部主题</option>
                  <option value="强国建设">强国建设</option>
                  <option value="上海实践">上海实践</option>
                  <option value="创新发展">创新发展</option>
                  <option value="校园文明">校园文明</option>
                </select>
              </div>
            </div>
          </div>
          <div class="cases-grid" id="cases-list">
            <!-- 动态加载 -->
          </div>
        </div>
      </div>

      <!-- 创建案例 -->
      <div id="page-create" class="page">
        <div class="container">
          <h2 class="page-title">创建案例</h2>
          <form class="case-form" id="create-case-form" onsubmit="event.preventDefault(); submitCase();">
            <div class="form-group">
              <label for="case-title">案例标题 *</label>
              <input
                type="text"
                id="case-title"
                class="form-input"
                required
                placeholder="请输入案例标题"
              />
            </div>
            <div class="form-group">
              <label for="case-author">作者</label>
              <input
                type="text"
                id="case-author"
                class="form-input"
                placeholder="请输入作者姓名"
              />
            </div>
            <div class="form-group">
              <label for="case-department">部门</label>
              <input
                type="text"
                id="case-department"
                class="form-input"
                placeholder="请输入部门"
              />
            </div>
            <div class="form-group">
              <label for="case-type">案例类型 *</label>
              <select id="case-type" class="form-input" required>
                <option value="">请选择案例类型</option>
                <option value="TYPE_A">思政课教学案例</option>
                <option value="TYPE_B">课程思政共享资源案例</option>
                <option value="TYPE_C">实践育人案例</option>
              </select>
            </div>
            <div class="form-group">
              <label for="case-theme">案例主题 *</label>
              <select id="case-theme" class="form-input" required>
                <option value="">请选择案例主题</option>
                <option value="强国建设">强国建设</option>
                <option value="上海实践">上海实践</option>
                <option value="创新发展">创新发展</option>
                <option value="校园文明">校园文明</option>
              </select>
            </div>
            <div class="form-group">
              <label for="case-content">案例内容 *</label>
              <textarea
                id="case-content"
                class="form-textarea"
                rows="15"
                placeholder="请输入案例内容"
              ></textarea>
            </div>
            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="auto-process" />
                <span>自动处理（分类、生成多个版本）</span>
              </label>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-info" onclick="resetCaseForm()">
                重置表单
              </button>
              <button
                type="button"
                class="btn btn-secondary"
                onclick="saveDraft()"
              >
                保存草稿
              </button>
              <button
                type="button"
                class="btn btn-primary"
                onclick="submitCase()"
              >
                提交案例
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- 审核管理 -->
      <div id="page-review" class="page">
        <div class="container">
          <h2 class="page-title">审核管理</h2>
          <div class="tabs">
            <button
              class="tab active"
              data-tab="pending"
              onclick="switchReviewTab('pending')"
            >
              待审核
            </button>
            <button class="tab" data-tab="approved" onclick="switchReviewTab('approved')">
              已通过
            </button>
            <button class="tab" data-tab="rejected" onclick="switchReviewTab('rejected')">
              已驳回
            </button>
            <button class="tab" data-tab="all" onclick="switchReviewTab('all')">
              全部案例
            </button>
          </div>
          <div id="review-list">
            <!-- 动态加载 -->
          </div>
        </div>
      </div>

      <!-- 数据统计 -->
      <div id="page-stats" class="page">
        <div class="container">
          <h2 class="page-title">数据统计</h2>
          <div class="stats-dashboard" id="stats-dashboard">
            <!-- 动态加载 -->
          </div>
        </div>
      </div>

      <!-- 我的提交 -->
      <div id="page-my-cases" class="page">
        <div class="container">
          <h2 class="page-title">我的提交</h2>
          <div class="tabs">
            <button
              class="tab active"
              data-tab="pending_review"
              onclick="switchMyCasesTab('pending_review')"
            >
              待审核
            </button>
            <button
              class="tab"
              data-tab="approved"
              onclick="switchMyCasesTab('approved')"
            >
              已通过
            </button>
            <button
              class="tab"
              data-tab="needs_revision"
              onclick="switchMyCasesTab('needs_revision')"
            >
              已驳回
            </button>
            <button
              class="tab"
              data-tab="draft"
              onclick="switchMyCasesTab('draft')"
            >
              我的草稿
            </button>
            <button
              class="tab"
              data-tab="all"
              onclick="switchMyCasesTab('all')"
            >
              提交记录
            </button>
          </div>
          <div id="my-cases-list">
            <!-- 动态加载 -->
          </div>
        </div>
      </div>
    </main>

    <!-- 登录弹窗 -->
    <div id="login-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>用户登录</h3>
          <button class="modal-close" onclick="closeLoginModal()">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <form
            id="login-form"
            onsubmit="
              event.preventDefault();
              login();
            "
          >
            <div class="form-group">
              <label for="login-username">用户名</label>
              <input
                type="text"
                id="login-username"
                class="form-input"
                required
                placeholder="请输入用户名"
              />
            </div>
            <div class="form-group">
              <label for="login-password">密码</label>
              <input
                type="password"
                id="login-password"
                class="form-input"
                required
                placeholder="请输入密码"
              />
            </div>
            <div class="form-actions">
              <button
                type="button"
                class="btn btn-secondary"
                onclick="closeLoginModal()"
              >
                取消
              </button>
              <button type="button" class="btn btn-primary" onclick="login()">登录</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="change-password-modal" class="modal">
      <div class="modal-content modal-content-sm">
        <div class="modal-header">
          <h3>&#20462;&#25913;&#23494;&#30721;</h3>
          <button class="modal-close" onclick="closeChangePasswordModal()">&times;</button>
        </div>
        <div class="modal-body">
          <form id="change-password-form" onsubmit="event.preventDefault(); changePassword();">
            <div id="force-password-tip" class="password-tip" style="display: none">
              &#39318;&#27425;&#30331;&#24405;&#24517;&#39035;&#20462;&#25913;&#21021;&#22987;&#23494;&#30721;&#21518;&#25165;&#33021;&#32487;&#32493;&#20351;&#29992;&#12290;
            </div>
            <div class="form-group">
              <label for="old-password">&#21407;&#23494;&#30721;</label>
              <input type="password" id="old-password" class="form-input" required />
            </div>
            <div class="form-group">
              <label for="new-password">&#26032;&#23494;&#30721;</label>
              <input type="password" id="new-password" class="form-input" required minlength="8" />
            </div>
            <div class="form-group">
              <label for="confirm-new-password">&#30830;&#35748;&#26032;&#23494;&#30721;</label>
              <input type="password" id="confirm-new-password" class="form-input" required minlength="8" />
            </div>
            <div class="form-actions">
              <button type="button" id="change-password-cancel" class="btn btn-secondary" onclick="closeChangePasswordModal()">&#21462;&#28040;</button>
              <button type="button" class="btn btn-primary" onclick="changePassword()">&#20445;&#23384;</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ?????? -->
    <div id="case-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modal-title">案例详情</h3>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modal-body">
          <!-- 动态加载 -->
        </div>
      </div>
    </div>

    <!-- 审核弹窗 -->
    <div id="review-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>审核案例</h3>
          <button class="modal-close" onclick="closeReviewModal()">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <form id="review-form" onsubmit="event.preventDefault(); submitReview();">
            <input type="hidden" id="review-case-id" />
            <div class="form-group">
              <label for="reviewer-name">审核人</label>
              <input
                type="text"
                id="reviewer-name"
                class="form-input"
                required
              />
            </div>
            <div class="form-group">
              <label for="review-comment">审核意见</label>
              <textarea
                id="review-comment"
                class="form-textarea"
                rows="5"
                required
              ></textarea>
            </div>
            <div class="form-group">
              <label>审核结果</label>
              <div class="radio-group">
                <label class="radio-label">
                  <input
                    type="radio"
                    name="review-status"
                    value="approve"
                    checked
                  />
                  <span>通过</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="review-status" value="reject" />
                  <span>需修改</span>
                </label>
              </div>
            </div>
            <div class="form-actions">
              <button
                type="button"
                class="btn btn-secondary"
                onclick="closeReviewModal()"
              >
                取消
              </button>
              <button
                type="button"
                class="btn btn-primary"
                onclick="submitReview()"
              >
                提交审核
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
  </body>
</html>
