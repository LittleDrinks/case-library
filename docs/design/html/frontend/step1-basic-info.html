<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>填写案例基本信息 - 强国有我思政案例库</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23c41e3a'/><text y='.85em' x='50%' text-anchor='middle' font-size='60' fill='white' font-family='serif'>强</text></svg>">
  <style>
    /* ─── tokens ───────────────────────────────────────────────────────── */
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --fg: #1a1a1a;
      --muted: #666666;
      --border: #e5e5e5;
      --accent: #c41e3a;
      --accent-soft: #fef2f2;
      --accent-dark: #a01830;
      --success: #22c55e;
      --gray-surface: #fafafa;
      --gray-bg: #f5f5f5;
      --gray-bg-dark: #f0f0f0;
      --gray-border: #e5e5e5;
      --gray-text: #bbb;
      --gray-text-light: #ccc;
      --gray-hint: #999;
      --gray-input: #f9f9f9;
      --success-bg: #dcfce7;
      --success-fg: #166534;
      --success-fg-light: #15803d;
      --success-border: var(--success-border);
      --success-surface: #f0fdf4;
      --warn-bg: #fef3c7;
      --warn-fg: #92400e;
      --font-display: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'Iowan Old Style', 'Charter', Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', Menlo, monospace;
    }

    /* ─── reset & base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }
    img, svg { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; }
    input, textarea, select { font: inherit; }

    /* ─── topnav ────────────────────────────────────────────────────── */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      height: 64px;
    }
    .topnav-inner {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center;
      height: 100%; max-width: 1440px; margin: 0 auto; padding: 0 24px;
    }
    .topnav-left {
      display: flex; align-items: center; gap: 12px;
    }
    .logo-badge {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 50%;
      display: grid; place-items: center;
      color: white; font-size: 10px; font-weight: 700;
      font-family: var(--font-display);
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 700;
      color: var(--accent); letter-spacing: 2px;
    }
    .topnav-nav {
      display: flex; align-items: center; gap: 6px;
      justify-self: center;
    }
    .topnav-nav a {
      padding: 6px 14px; border-radius: 8px;
      font-size: 14px; font-weight: 500; color: var(--muted);
      transition: color 0.15s, background 0.15s;
    }
    .topnav-nav a:hover {
      color: var(--fg); background: var(--gray-bg);
    }
    .topnav-nav a.active {
      color: var(--accent); background: var(--accent-soft);
    }
    .topnav-right {
      display: flex; align-items: center; gap: 16px;
      justify-self: end;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 180px; padding: 8px 12px 8px 32px;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--gray-input); font-size: 13px;
      outline: none; transition: border-color 0.15s ease, width 0.2s ease;
    }
    .search-box input:focus {
      border-color: var(--accent);
      width: 220px;
    }
    .search-box input::placeholder {
      color: var(--muted);
    }
    .search-box svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--muted);
      pointer-events: none;
    }
    .icon-btn {
      width: 36px; height: 36px;
      display: grid; place-items: center;
      border-radius: 50%; border: none; background: transparent;
      color: var(--muted); cursor: pointer;
      transition: background 0.15s ease;
    }
    .icon-btn:hover { background: var(--gray-bg); }
    .icon-btn svg { width: 18px; height: 18px; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent-soft); color: var(--accent);
      display: grid; place-items: center;
      font-size: 12px; font-weight: 600;
      border: 1px solid var(--border);
    }

    /* ─── layout ────────────────────────────────────────────────────── */
    .page-wrapper {
      display: flex; min-height: 100vh;
      padding-top: 64px;
    }

    /* ─── sidebar steps ─────────────────────────────────────────────── */
    .sidebar {
      width: 260px; flex-shrink: 0;
      background: var(--bg);
      border-right: 1px solid var(--border);
      padding: 32px 20px;
      position: fixed; top: 64px; bottom: 0; left: 0;
      overflow-y: auto;
    }
    .progress-header {
      font-size: 12px; font-weight: 600; color: var(--fg);
      margin-bottom: 8px; letter-spacing: 0.5px;
    }
    .progress-bar {
      height: 4px; background: var(--gray-bg-dark); border-radius: 2px;
      margin-bottom: 24px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 2px;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 11px; color: var(--muted); margin-bottom: 24px;
    }
    .step-list {
      display: flex; flex-direction: column; gap: 4px;
    }
    .step-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px; border-radius: 8px;
      cursor: default; position: relative;
      transition: background 0.15s ease;
    }
    .step-item.current {
      background: var(--accent-soft);
    }
    .step-item.current::before {
      content: ''; position: absolute; left: 0; top: 12px; bottom: 12px;
      width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
    }
    .step-icon {
      width: 24px; height: 24px; flex-shrink: 0;
      display: grid; place-items: center;
      border-radius: 50%; margin-top: 1px;
    }
    .step-icon.done {
      background: var(--accent); color: white;
    }
    .step-icon.current {
      background: var(--accent-soft); color: var(--accent);
      border: 1.5px solid var(--accent);
    }
    .step-icon.todo {
      background: var(--gray-bg); color: var(--gray-text);
      border: 1.5px solid var(--gray-border);
    }
    .step-icon svg { width: 12px; height: 12px; }
    .step-info { flex: 1; }
    .step-title {
      font-size: 13px; font-weight: 500; color: var(--fg); line-height: 1.4;
    }
    .step-item.current .step-title {
      color: var(--accent); font-weight: 600;
    }
    .step-item.todo .step-title {
      color: var(--gray-text);
    }
    .step-desc {
      font-size: 11px; color: var(--muted); margin-top: 2px;
    }
    .step-item.todo .step-desc {
      color: var(--gray-text-light);
    }

    /* ─── main content ──────────────────────────────────────────────── */
    .main {
      flex: 1; margin-left: 260px;
      padding: 32px 48px 48px;
      max-width: 900px;
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted); margin-bottom: 24px;
    }
    .breadcrumb a { color: var(--muted); transition: color 0.15s; }
    .breadcrumb a:hover { color: var(--fg); }
    .breadcrumb-sep { color: var(--gray-text-light); }
    .breadcrumb .current { color: var(--accent); font-weight: 500; }
    .page-title {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 700;
      color: var(--fg); margin-bottom: 8px; letter-spacing: 1px;
    }
    .page-desc {
      font-size: 13px; color: var(--muted); line-height: 1.7;
      margin-bottom: 32px;
    }

    /* ─── form ──────────────────────────────────────────────────────── */
    .form-section { margin-bottom: 28px; }
    .form-label {
      font-size: 13px; font-weight: 500; color: var(--fg);
      margin-bottom: 8px; display: block;
    }
    .form-label .required { color: var(--accent); margin-left: 2px; }
    .form-input {
      width: 100%; padding: 11px 14px;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface); font-size: 14px;
      outline: none; transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .form-input::placeholder { color: var(--gray-text); }
    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    }
    .form-hint {
      font-size: 11px; color: var(--gray-hint); margin-top: 6px;
    }

    /* ─── tip card ──────────────────────────────────────────────────── */
    .tip-card {
      display: flex; gap: 12px;
      background: var(--accent-soft); border-radius: 8px;
      padding: 16px 20px; margin: 24px 0;
    }
    .tip-icon {
      width: 20px; height: 20px; flex-shrink: 0;
      color: var(--accent); margin-top: 2px;
    }
    .tip-title {
      font-size: 13px; font-weight: 600; color: var(--fg);
      margin-bottom: 4px;
    }
    .tip-text {
      font-size: 12px; color: var(--muted); line-height: 1.7;
    }

    /* ─── buttons ───────────────────────────────────────────────────── */
    .btn-group {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 40px; padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .btn-group-left {
      display: flex; gap: 12px;
    }
    .btn-group-right {
      display: flex; gap: 12px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 24px; border-radius: 6px;
      font-size: 14px; font-weight: 500;
      border: 1px solid transparent; cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-primary {
      background: var(--accent); color: white; border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-dark); border-color: var(--accent-dark);
    }
    .btn-secondary {
      background: white; color: var(--fg); border-color: var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--fg); background: var(--gray-surface);
    }
    .btn svg { width: 14px; height: 14px; }

    /* ─── responsive ────────────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 24px; max-width: 100%; }
      .form-row { grid-template-columns: 1fr; }
      .topnav-nav { display: none; }
    }
    @media (max-width: 640px) {
      .search-box { display: none; }
      .page-title { font-size: 22px; }
      .main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- ═══ TOP NAVIGATION ═══ -->
<header class="topnav">
  <div class="topnav-inner">
    <a href="index.html" class="topnav-left" style="text-decoration:none;">
      <div class="logo-badge" title="上海大学校徽">上大</div>

      </div>

      </button>
      <div class="avatar" title="用户">用</div>
    </div>
  </div>
</header>

<!-- ═══ PAGE WRAPPER ═══ -->
<div class="page-wrapper">

  <!-- ═══ SIDEBAR STEPS ═══ -->
  <aside class="sidebar">
    <div class="progress-header">进度</div>
    <div class="progress-bar">
      <div class="progress-fill" style="width: 20%"></div>
    </div>
    <div class="progress-text">20% 完成</div>

    <div class="step-list">
      <div class="step-item current">
        <div class="step-icon current">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
        </div>
        <div class="step-info">
          <div class="step-title">基本信息</div>
          <div class="step-desc">填写标题与作者</div>
        </div>
      </div>
      <div class="step-item todo">
        <div class="step-icon todo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div class="step-info">
          <div class="step-title">案例内容</div>
          <div class="step-desc">撰写案例正文</div>
        </div>
      </div>
      <div class="step-item todo">
        <div class="step-icon todo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <div class="step-info">
          <div class="step-title">分类选择</div>
          <div class="step-desc">选择学科分类</div>
        </div>
      </div>
      <div class="step-item todo">
        <div class="step-icon todo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
        </div>
        <div class="step-info">
          <div class="step-title">AI 审核</div>
          <div class="step-desc">智能内容审核</div>
        </div>
      </div>
      <div class="step-item todo">
        <div class="step-icon todo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="step-info">
          <div class="step-title">提交确认</div>
          <div class="step-desc">确认并提交</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="main">
    <nav class="breadcrumb">
      <a href="index.html">案例库</a>
      <span class="breadcrumb-sep">›</span>
      <span class="current">创建新案例</span>
    </nav>

    <h1 class="page-title">填写案例基本信息</h1>
    <p class="page-desc">
      请准确填写案例的标题、作者及所属单位信息。这些信息将作为案例在库中检索、引用及展示的核心标识。
    </p>

    <div class="form-section">
      <label class="form-label">案例标题 <span class="required">*</span></label>
      <input type="text" class="form-input" placeholder="输入具有学术性与引领性的标题" />
      <p class="form-hint">建议标题长度在 15-30 字之间，包含核心教学知识点。</p>
    </div>

    <div class="form-row">
      <div class="form-section">
        <label class="form-label">作者姓名 <span class="required">*</span></label>
        <input type="text" class="form-input" placeholder="姓名" />
      </div>
      <div class="form-section">
        <label class="form-label">所属部门/学院 <span class="required">*</span></label>
        <input type="text" class="form-input" placeholder="例如：马克思主义学院" />
      </div>
    </div>

    <div class="tip-card">
      <svg class="tip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <div>
        <div class="tip-title">编写小贴士</div>
        <div class="tip-text">
          优秀的思政案例应当将价值引领与知识传授有机融合。在"基本信息"阶段，请确保所有参与作者的姓名拼写正确，并使用官方的全称来标注所属学院。
        </div>
      </div>
    </div>

    <div class="btn-group">
      <div class="btn-group-left">
        <button class="btn btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          保存草稿
        </button>
      </div>
      <div class="btn-group-right">
        <button class="btn btn-primary" onclick="location.href='step2-case-content.html'">
          继续
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </main>

</div>

<script src="js/common.js"></script>
