services:
  app:
    build: .
    init: true
    ports:
      - "8001:8001"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: case_library
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "if [ -f backend/scripts/init_data.py ]; then python backend/scripts/init_data.py || true;
             elif [ -f backend/init_users.py ]; then python backend/init_users.py || true; fi;
             if [ -f backend/core/main.py ]; then uvicorn backend.core.main:app --host 0.0.0.0 --port 8001 --reload;
             else uvicorn backend.main:app --host 0.0.0.0 --port 8001 --reload; fi"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/constants', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    image: node:20
    init: true
    working_dir: /app
    profiles: ["frontend"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "if [ -f package.json ]; then
               if [ -f package-lock.json ]; then npm ci; else npm install; fi;
               npm run dev -- --host 0.0.0.0;
             else
               echo 'frontend/package.json not present; frontend service idle.';
               tail -f /dev/null;
             fi"

  mongo:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  frontend_node_modules:
